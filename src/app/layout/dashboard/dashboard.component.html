<div class="dashboard-container" dir="rtl">

  <header class="header-glass mb-4">
    <div class="container-fluid">
      <app-header [col]="'col-12'"></app-header>
    </div>
  </header>

  <div class="container-fluid">
    <div class="row g-4">

      <main class="col-lg-9 col-xl-10 order-2 order-lg-1">
        <div class="content-card p-4">
          <h2 class="fw-bold mb-4">مرحباً بك مجدداً 👋</h2>
          <div class="placeholder-content" style="height: 1000px;">

        <div class="row">
  <div class="col-md-4">
    <app-stat-card
      title="إجمالي المستخدمين"
      [value]="1482"
      icon="fas fa-users"
      color="#0d9488"
      bgColor="#ccfbf1">
    </app-stat-card>
  </div>

  <div class="col-md-4">
    <app-stat-card
      title="الطلاب النشطون"
      [value]="1240"
      icon="fas fa-user-graduate"
      color="#6366f1"
      bgColor="#e0e7ff">
    </app-stat-card>
  </div>

  <div class="col-md-4">
    <app-stat-card
      title="المعلمون"
      [value]="242"
      icon="fas fa-chalkboard-teacher"
      color="#d97706"
      bgColor="#fef3c7">
    </app-stat-card>
  </div>
        </div>

        <div class="user-management-section mt-5">
          <h3 class="fw-bold mb-4">إدارة المستخدمين</h3>
          <div class="user-list">
            </div>
            <app-user-row
            [user]="{
              name: 'سارة أحمد',
              email: 'a@a.a'
            }"
              >
            </app-user-row>

            <app-user-row
            [user]="{
              name: 'سارة أحمد',
              email: 'a@a.a'
            }"
              >
          </app-user-row>

            </div>

          </div>
        </div>
      </main>

      <aside class="col-lg-3 col-xl-2 d-none d-lg-block order-1 order-lg-2">
        <div class="sidebar-modern sticky-top">

          <div class="user-profile-widget mb-4">
            <div class="d-flex align-items-center gap-3">
              <div class="avatar-wrapper">
                <!-- <img src="../../../assets/user.png" alt="User" class="w-50 rounded-circle"> -->
              </div>
              <div>
                <h6 class="mb-0 fw-bold text-dark">أحمد منصور</h6>
                <span class="badge bg-soft-primary text-primary">مستوى 12</span>
              </div>
            </div>
          </div>

          <nav class="side-nav">
            <ul class="nav flex-column gap-2">
              <li class="nav-item">
                <a class="nav-link active" href="#">
                  <i class="fas fa-home-alt"></i>
                  <span>الرئيسية</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">
                  <i class="fas fa-book-reader"></i>
                  <span>كورساتي</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">
                  <i class="fas fa-chart-line"></i>
                  <span>الإحصائيات</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" routerLink="/profile">
                  <i class="fas fa-chalkboard-teacher"></i>
                  <span >الملف الشخصي</span>

                </a>
              </li>
              <li class="nav-item mt-4">
                <a class="nav-link settings-link" href="#">
                  <i class="fas fa-user-cog"></i>
                  <span>الإعدادات</span>
                </a>
              </li>
            </ul>
          </nav>

        </div>
      </aside>

    </div>
  </div>

  <div class="mobile-nav-wrapper d-lg-none">
    <div class="mobile-nav-blur">
      <div class="d-flex justify-content-around align-items-center h-100">
        <a href="#" class="nav-link active">
          <i class="fas fa-home"></i>
        </a>
        <a routerLink="/tracks" class="nav-link">
          <i class="fas fa-book-open"></i>
        </a>
        <a routerLink="/exams" class="nav-link">
          <i class="fas fa-trophy"></i>
        </a>
        <a routerLink="/profile" class="nav-link">
          <i class="fas fa-cog"></i>
        </a>
      </div>
    </div>
  </div>
</div>
