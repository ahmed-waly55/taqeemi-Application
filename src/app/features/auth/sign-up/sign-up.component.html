<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="auth-box">
    <div class="brand-section text-center">
      <div class="logo-wrapper">
        <i class="fas fa-user-plus"></i>
      </div>
      <h3 class="mt-3 fw-bold color-primary">انضم إلى تقييمي</h3>
      <p class="text-muted small">ابدأ رحلة تقييم مستواك الدراسي الآن</p>
    </div>

    <div class="auth-nav d-flex mb-4">
      <button class="nav-btn" routerLink="/login">تسجيل دخول</button>
      <button class="nav-btn active">حساب جديد</button>
    </div>

    <form  (ngSubmit)="onRegister()">

      <div class="form-group mb-3">
        <label class="form-label">الاسم رباعي (كما في الكشف)</label>
        <div class="input-group-custom">
          <i class="far fa-id-card"></i>
          <input type="text" formControlName="fullName" class="form-control" placeholder="أحمد محمد علي...">
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="form-label">البريد الإلكتروني</label>
        <div class="input-group-custom">
          <i class="far fa-envelope"></i>
          <input type="email" formControlName="email" class="form-control" placeholder="student@edu.com">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">كلمة المرور</label>
          <div class="input-group-custom">
            <i class="fas fa-lock"></i>
            <input type="password" formControlName="password" class="form-control" placeholder="••••••••">
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">تأكيد الكلمة</label>
          <div class="input-group-custom">
            <i class="fas fa-check-double"></i>
            <input type="password" formControlName="confirmPassword" class="form-control" placeholder="••••••••">
          </div>
        </div>
      </div>

      <div class="form-check mb-4 small">
        <input class="form-check-input" type="checkbox" id="terms" required>
        <label class="form-check-label text-muted" for="terms">
          أوافق على سياسة الامتحانات وشروط المنصة
        </label>
      </div>

      <button type="submit" class="btn btn-primary-grad w-100">
        إنشاء الحساب ودخول المنصة <i class="fas fa-rocket ms-2"></i>
      </button>
    </form>

    <p class="text-center mt-4 mb-0 small text-muted">
      لديك حساب بالفعل؟ <a routerLink="/login" class="help-link">اضغط هنا لتسجيل الدخول</a>
    </p>
  </div>
</div>
